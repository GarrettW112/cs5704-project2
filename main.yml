build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests with pytest
        run: python -m pytest

      - name: Notify Mattermost on Success
        if: success()
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          TEXT: "**Build Succeeded!**\n**Repo:** ${{ github.repository }}\n**Commit:** ${{ github.sha }}"

      - name: Notify Mattermost on Failure
        if: failure()
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          TEXT: "**Build Failed!**\nCheck the logs here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"